thresholds:
  severity_weights:
    blocker: 30
    warning: 12
    question: 5
    nit: 1
    blocked: 0
  failed_check_risk: 20
  ship_with_risks_risk: 35
  min_proof_ship: 60

test_proof:
  # code: require test proof for app/source files only
  # always: require test proof for any reviewed file
  # off: disable the no-test finding
  mode: code

scan:
  # 0 disables the size guard. Large skipped files are reported as review gaps.
  max_file_bytes: 2000000
  cache: true

severity_overrides:
  # BUG-002: nit
  # OPS-002: question

ignore:
  findings: []
  codes: []
  fingerprints: []
  paths:
    - examples/**

static_patterns:
  - code: TEAM-001
    severity: warning
    regex: dangerousCall\(
    title: Team-specific dangerous call needs a safer wrapper or proof.

check_plugins:
  - name: go-test
    command: ["go", "test", "./..."]
    kind: test

analysis_plugins:
  - name: custom-sast
    command: ["python3", "tools/custom_sast.py"]
    kind: analysis

reasoning_plugins:
  - name: llm-reviewer
    command: ["llm", "prompt", "--system", "Review this CODE-GRILL session JSON."]
    kind: reasoning
    # Plain text is attached to the report. Structured JSON may include:
    # summary, verdict, confidence, risks, questions, recommendations,
    # remaining_risks, and findings.
