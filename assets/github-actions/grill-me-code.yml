name: grill-me-code

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  grill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Grill Me Code
        run: |
          python3 scripts/grill_runner.py \
            --mode diff \
            --base "origin/${{ github.base_ref || 'main' }}" \
            --run-checks \
            --progress \
            --fail-on-do-not-ship
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-grill
          path: .grill-me-code/
