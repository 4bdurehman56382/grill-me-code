name: grill-me-code

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  grill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runner dependencies
        run: |
          if [ -f requirements.txt ]; then
            python3 -m pip install -r requirements.txt
          fi
      - name: Run Grill Me Code
        run: |
          python3 scripts/grill_runner.py \
            --mode diff \
            --base auto \
            --run-checks \
            --progress \
            --fail-on-do-not-ship
      - name: Annotate findings
        if: always()
        run: python3 scripts/github_annotations.py --session .grill-me-code/latest.json
      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .grill-me-code/CODE-GRILL.sarif
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-grill
          path: .grill-me-code/
